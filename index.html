    :root {
      color-scheme: dark;
      --bg: #16161a;
      --card: rgba(28, 28, 32, 0.75);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f9fafb;
      --muted: #9ca3af;
      --accent: #4f46e5;
      --vignette: radial-gradient(ellipse at center, rgba(22,22,26,0.6) 0%, transparent 50%);
      --overlay-bg: rgba(0, 0, 0, 0.45);
      --nav-bg: rgba(28, 28, 32, 0.94);
      --tooltip-bg: rgba(28, 28, 34, 0.95);
      --tooltip-text: #e2e8f0;
      --tooltip-muted: rgba(180,180,195,0.7);
    }

    body.theme-light {
      color-scheme: light;
      --bg: #f0f1f4;
      --card: rgba(255, 255, 255, 0.9);
      --border: rgba(0, 0, 0, 0.1);
      --text: #111113;
      --muted: #4b5563;
      --accent: #4f46e5;
      --vignette: radial-gradient(ellipse at center, rgba(248,249,252,0.8) 0%, transparent 55%);
      --overlay-bg: rgba(0, 0, 0, 0.3);
      --nav-bg: rgba(255, 255, 255, 0.97);
      --tooltip-bg: rgba(255, 255, 255, 0.98);
      --tooltip-text: #111113;
      --tooltip-muted: rgba(55, 65, 81, 0.9);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      overflow: hidden;
    }

    canvas#graph {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 5;
      background: var(--vignette);
      pointer-events: none;
    }

    /* Identity block – side, not blocking graph */
    .identity {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 10;
      pointer-events: auto;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.25rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }

    .identity h1 {
      font-size: clamp(1.5rem, 3vw, 2rem);
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    .identity .subtitle {
      font-size: 0.9rem;
      color: var(--muted);
      margin: 0;
    }

    /* Hamburger – open nav */
    .menu-toggle {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 20;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, color 0.2s ease;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .menu-toggle:hover,
    .menu-toggle:focus-visible {
      border-color: rgba(79, 70, 229, 0.6);
      color: var(--accent);
    }

    .menu-toggle .fa-bars { font-size: 1.25rem; }
    .menu-toggle .fa-times { font-size: 1.25rem; display: none; }
    .menu-toggle.open .fa-bars { display: none; }
    .menu-toggle.open .fa-times { display: block; }

    /* Theme toggle – light/dark */
    .theme-toggle {
      position: fixed;
      top: 1.5rem;
      right: 5rem;
      z-index: 20;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, color 0.2s ease;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .theme-toggle:hover,
    .theme-toggle:focus-visible {
      border-color: rgba(79, 70, 229, 0.6);
      color: var(--accent);
    }
    .theme-toggle .fa-moon { display: none; }
    .theme-toggle .fa-sun { display: none; }
    body:not(.theme-light) .theme-toggle .fa-sun { display: block; font-size: 1.15rem; }
    body.theme-light .theme-toggle .fa-moon { display: block; font-size: 1.15rem; }

    /* Nav panel – hidable sidebar with links */
    .nav-overlay {
      position: fixed;
      inset: 0;
      z-index: 15;
      background: var(--overlay-bg);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }
    .nav-overlay.visible {
      opacity: 1;
      visibility: visible;
    }

    .nav-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: min(280px, 85vw);
      height: 100vh;
      z-index: 18;
      background: var(--nav-bg);
      border-left: 1px solid var(--border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 5rem 1.5rem 2rem;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      box-shadow: -20px 0 60px rgba(0, 0, 0, 0.4);
    }
    .nav-panel.open {
      transform: translateX(0);
    }

    .nav-panel .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .nav-panel .links a {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 1px solid var(--border);
      color: var(--text);
      transition: transform 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }

    .nav-panel .links a:hover,
    .nav-panel .links a:focus-visible {
      transform: translateX(-4px);
      border-color: rgba(79, 70, 229, 0.7);
      color: var(--accent);
    }

    #tooltip {
      position: fixed;
      z-index: 50;
      padding: 6px 12px 6px 14px;
      background: var(--tooltip-bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--tt-color, rgba(255,255,255,0.2));
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    #tooltip.visible { opacity: 1; }
    #tooltip strong {
      display: block;
      font: 600 12px/1.4 'Inter', sans-serif;
      color: var(--tooltip-text);
    }
    #tooltip span {
      display: block;
      font: 500 9px/1.4 'Inter', sans-serif;
      color: var(--tooltip-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-top: 1px;
    }

      .identity { top: 1rem; left: 1rem; padding: 0.75rem 1rem; }
      .theme-toggle { right: 4rem; width: 42px; height: 42px; }
      .menu-toggle { width: 42px; height: 42px; }
      .nav-panel .links a { width: 42px; height: 42px; }

  <script>
    (function () {
      var toggle = document.querySelector('.menu-toggle');
      var overlay = document.querySelector('.nav-overlay');
      var panel = document.querySelector('.nav-panel');
      function open() {
        toggle.classList.add('open');
        toggle.setAttribute('aria-expanded', 'true');
        toggle.setAttribute('aria-label', 'Close menu');
        overlay.classList.add('visible');
        panel.classList.add('open');
      }
      function close() {
        toggle.classList.remove('open');
        toggle.setAttribute('aria-expanded', 'false');
        toggle.setAttribute('aria-label', 'Open menu');
        overlay.classList.remove('visible');
        panel.classList.remove('open');
      }
      toggle.addEventListener('click', function () {
        if (panel.classList.contains('open')) close(); else open();
      });
      overlay.addEventListener('click', close);
    })();
    (function () {
      var themeBtn = document.querySelector('.theme-toggle');
      function updateLabel() {
        themeBtn.setAttribute('aria-label', document.body.classList.contains('theme-light') ? 'Switch to dark mode' : 'Switch to light mode');
      }
      updateLabel();
      themeBtn.addEventListener('click', function () {
        document.body.classList.toggle('theme-light');
        try { localStorage.setItem('theme', document.body.classList.contains('theme-light') ? 'light' : 'dark'); } catch (e) {}
        updateLabel();
      });
    })();
  </script>

      ['Service Mesh','gRPC'],['Event-Driven Arch.','RabbitMQ'],
      ['RabbitMQ','Celery'],['RabbitMQ','Microservices'],
      ['Bash','CI/CD'],['GCP','Azure'],
      // ── Frontend & WebGL internal ──
      ['React','Next.js'],['React','TypeScript'],['React','TailwindCSS'],
      ['React','Zustand'],['React','Redux'],['React','Framer Motion'],
      ['Next.js','Vercel'],['Next.js','TypeScript'],
      ['TypeScript','Vite'],['TypeScript','Webpack'],
      ['TailwindCSS','CSS Grid'],['TailwindCSS','Vite'],
      ['WebAssembly','Three.js'],['Three.js','WebGL'],
      ['WebGL','HTML5 Canvas'],['Svelte','Vite'],['Svelte','TypeScript'],
      ['Vue.js','Vite'],['Vue.js','TypeScript'],['D3.js','HTML5 Canvas'],
      ['HTML5 Canvas','Web Workers'],['Web Workers','PWA'],['PWA','React'],
      ['Zustand','Redux'],['Webpack','Vite'],['CSS Grid','HTML5 Canvas'],
      // ── Core CS & Applied Math internal ──
      ['Combinatorics','Algorithm Design'],['Combinatorics','Graph Theory'],
      ['Combinatorics','Probability'],['Multivariable Calculus','Linear Algebra'],
      ['Multivariable Calculus','Optimization'],['Graph Theory','Algorithm Design'],
      ['Graph Theory','Data Structures'],['Graph Theory','NP-Completeness'],
      ['Algorithm Design','Data Structures'],['Algorithm Design','Dynamic Programming'],
      ['Algorithm Design','Complexity Theory'],['Cryptography','Information Theory'],
      ['Cryptography','Hashing'],['Cryptography','NP-Completeness'],
      ['System Design','Cache Design'],['Linear Algebra','Optimization'],
      ['Probability','Statistics'],['Probability','Information Theory'],
      ['Statistics','Optimization'],['Complexity Theory','NP-Completeness'],
      ['Data Structures','Hashing'],['Data Structures','Cache Design'],
      ['Compilers','Type Theory'],['Compilers','Operating Systems'],
      ['Operating Systems','Concurrency'],['Operating Systems','Memory Management'],
      ['Concurrency','Memory Management'],['Memory Management','Cache Design'],
      ['Dynamic Programming','Optimization'],['Formal Verification','Type Theory'],
      ['Formal Verification','Compilers'],['Hashing','Cache Design'],
      ['Information Theory','Statistics'],
      // ── Cross-category connections ──
      ['Python','PyTorch'],['Python','LangChain'],['Python','DSPy'],
      ['Python','AutoGen'],['Python','OpenClaw'],['Python','Modal'],
      ['TypeScript','Node.js'],['WebAssembly','Rust'],
      ['WebAssembly','Cloudflare Workers'],['CUDA','C++'],
      ['Ray','Distributed Systems'],['Cassandra','Distributed Systems'],
      ['Apache Kafka','Event-Driven Arch.'],['Apache Kafka','Java'],
      ['DynamoDB','AWS'],['Redis','Cache Design'],['Redis','Celery'],
      ['Neo4j','Graph Theory'],['D3.js','Graph Theory'],
      ['System Design','Distributed Systems'],['System Design','Microservices'],
      ['System Design','Load Balancing'],['MLOps','CI/CD'],['MLOps','Docker'],
      ['MLOps','Apache Airflow'],['Feature Store','MLOps'],
      ['TLS/SSL','Cryptography'],['Linear Algebra','Embeddings'],
      ['Linear Algebra','PyTorch'],['Optimization','Training Pipelines'],
      ['Information Theory','Tokenization'],['Java','Spark'],
      ['LlamaIndex','Vector Search'],['LlamaIndex','Embeddings'],
      ['RAG','Vector Search'],['RAG','Embeddings'],
      ['Mistral','Hugging Face'],['MongoDB','Node.js'],['PostgreSQL','SQL'],
      ['Operating Systems','Linux'],['Computer Networks','TCP/IP'],
      ['Computer Networks','Distributed Systems'],['Compilers','C++'],
      ['Type Theory','TypeScript'],['Concurrency','Go'],['Concurrency','Rust'],
      ['Memory Management','C'],['Memory Management','Rust'],
      ['Vercel','AWS'],['Data Lake','S3'],
      ['Stream Processing','Event-Driven Arch.'],['Spark','Python'],
      ['OpenAI','RLHF'],['Anthropic','RLHF'],
      ['Embeddings','Vector Search'],['Pinecone','Embeddings']
    ].map(function (p) { return { source: p[0], target: p[1] }; });

    /* ───────────────────── DEGREE & ADJACENCY ───────────────────── */
    var degMap = {};
    nodes.forEach(function (n) { degMap[n.id] = 0; });
    edges.forEach(function (e) { degMap[e.source]++; degMap[e.target]++; });
    nodes.forEach(function (n) {
      n.degree = degMap[n.id] || 1;
      n.r = 1.5 + Math.sqrt(n.degree) * 0.7;
    });

    var adj = {};
    nodes.forEach(function (n) { adj[n.id] = new Set(); });
    edges.forEach(function (e) {
      adj[e.source].add(e.target);
      adj[e.target].add(e.source);
    });

    /* ───────────────────── CANVAS ───────────────────── */
    var W, H, dpr;
    function resize() {
      dpr = window.devicePixelRatio || 1;
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
    }
    resize();

    /* ───────────────────── INITIAL POSITIONS ───────────────────── */
    var gAngle = { a: 0, i: Math.PI / 3, v: 2 * Math.PI / 3, b: Math.PI, f: 4 * Math.PI / 3, c: 5 * Math.PI / 3 };
    var spread = Math.min(W, H) * 0.35;
    nodes.forEach(function (n) {
      var a = gAngle[n.g] + (Math.random() - 0.5) * 1.0;
      var r = spread * (0.3 + Math.random() * 0.7);
      n.x = W / 2 + Math.cos(a) * r;
      n.y = H / 2 + Math.sin(a) * r;
    });

    /* ───────────────────── SIMULATION ───────────────────── */
    var sim = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(edges).id(function (d) { return d.id; }).distance(80).strength(0.35))
      .force('charge', d3.forceManyBody().strength(-55).distanceMax(350))
      .force('x', d3.forceX(W / 2).strength(0.04))
      .force('y', d3.forceY(H / 2).strength(0.04))
      .force('collision', d3.forceCollide().radius(function (d) { return d.r + 8; }).strength(0.5))
      .alphaDecay(0.012)
      .velocityDecay(0.35);

    /* ───────────────────── HOVER STATE ───────────────────── */
    var hovered = null;
    var connSet = new Set();

    /* ───────────────────── RENDER ───────────────────── */
    function render() {
      var t = performance.now() * 0.0008;
      ctx.save();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.scale(dpr, dpr);

      // Regular edges
      ctx.beginPath();
      ctx.strokeStyle = isLight() ? 'rgba(55, 65, 110, 0.52)' : 'rgba(140, 150, 180, 0.48)';
      ctx.lineWidth = isLight() ? 0.55 : 0.5;
      for (var i = 0; i < edges.length; i++) {
        var e = edges[i];
        if (hovered && (e.source === hovered || e.target === hovered)) continue;
        ctx.moveTo(e.source.x, e.source.y);
        ctx.lineTo(e.target.x, e.target.y);
      }
      ctx.stroke();

      // Highlighted edges
      if (hovered) {
        ctx.beginPath();
        ctx.strokeStyle = rgba(hovered.g, isLight() ? 0.7 : 0.55);
        ctx.lineWidth = 1.2;
        for (var j = 0; j < edges.length; j++) {
          var he = edges[j];
          if (he.source === hovered || he.target === hovered) {
            ctx.moveTo(he.source.x, he.source.y);
            ctx.lineTo(he.target.x, he.target.y);
          }
        }
        ctx.stroke();
      }

      // Nodes
      for (var k = 0; k < nodes.length; k++) {
        var n = nodes[k];
        var isH = n === hovered;
        var isC = hovered !== null && connSet.has(n.id);

        if (isH) {
          ctx.beginPath();
          ctx.fillStyle = rgba(n.g, 0.12);
          ctx.arc(n.x, n.y, 22, 0, TAU);
          ctx.fill();
          ctx.beginPath();
          ctx.fillStyle = rgba(n.g, 0.95);
          ctx.arc(n.x, n.y, n.r * 1.8, 0, TAU);
          ctx.fill();
        } else if (isC) {
          ctx.beginPath();
          ctx.fillStyle = rgba(n.g, 0.06);
          ctx.arc(n.x, n.y, 14, 0, TAU);
          ctx.fill();
          ctx.beginPath();
          ctx.fillStyle = rgba(n.g, 0.7);
          ctx.arc(n.x, n.y, n.r * 1.3, 0, TAU);
          ctx.fill();
        } else {
          var breath = isLight()
            ? 0.58 + Math.sin(t + n.x * 0.004 + n.y * 0.004) * 0.12
            : 0.52 + Math.sin(t + n.x * 0.004 + n.y * 0.004) * 0.1;
          ctx.beginPath();
          ctx.fillStyle = rgba(n.g, breath);
          ctx.arc(n.x, n.y, n.r, 0, TAU);
          ctx.fill();
        }
      }

      ctx.restore();
    }

    /* ───────────────────── ANIMATION LOOP ───────────────────── */
    function animate() {
      render();
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    /* ───────────────────── MOUSE EVENTS ───────────────────── */
    canvas.addEventListener('mousemove', function (e) {
      var mx = e.clientX, my = e.clientY;
      var closest = null, minD = 28;
      for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        var d = Math.hypot(mx - n.x, my - n.y);
        if (d < minD) { minD = d; closest = n; }
      }

      if (closest !== hovered) {
        hovered = closest;
        if (hovered) {
          connSet = adj[hovered.id];
          tt.innerHTML = '<strong>' + hovered.id + '</strong><span>' + GL[hovered.g] + '</span>';
          tt.style.setProperty('--tt-color', rgba(hovered.g, 0.8));
          tt.className = 'visible';
        } else {
          connSet = new Set();
          tt.className = '';
        }
      }

      if (hovered) {
        tt.style.left = (mx + 14) + 'px';
        tt.style.top = (my - 10) + 'px';
      }
      canvas.style.cursor = hovered ? 'pointer' : 'default';
    });

    canvas.addEventListener('mouseleave', function () {
      hovered = null;
      connSet = new Set();
      tt.className = '';
      canvas.style.cursor = 'default';
    });

    /* ───────────────────── DRAG ───────────────────── */
    d3.select(canvas).call(
      d3.drag()
        .subject(function (event) {
          var pt = d3.pointer(event, canvas);
          var closest = null, minD = 28;
          for (var i = 0; i < nodes.length; i++) {
            var n = nodes[i];
            var d = Math.hypot(pt[0] - n.x, pt[1] - n.y);
            if (d < minD) { minD = d; closest = n; }
          }
          return closest;
        })
        .on('start', function (event) {
          if (!event.active) sim.alphaTarget(0.3).restart();
          event.subject.fx = event.subject.x;
          event.subject.fy = event.subject.y;
        })
        .on('drag', function (event) {
          event.subject.fx = event.x;
          event.subject.fy = event.y;
        })
        .on('end', function (event) {
          if (!event.active) sim.alphaTarget(0);
          event.subject.fx = null;
          event.subject.fy = null;
        })
    );

    /* ───────────────────── RESIZE ───────────────────── */
    window.addEventListener('resize', function () {
      resize();
      sim.force('x', d3.forceX(W / 2).strength(0.04));
      sim.force('y', d3.forceY(H / 2).strength(0.04));
      sim.alpha(0.3).restart();
    });
  })();
  </script>
</body>
